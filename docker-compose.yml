services:
  world-news-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: world-news-api
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s